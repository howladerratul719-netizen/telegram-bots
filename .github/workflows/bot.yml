name: Run Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Create cookies file
      run: |     cat << 'COOKIESEOF' > cookies.txt     ${{ secrets.COOKIES }}     COOKIESEOF

    - name: Run bot
      env:
        TOKEN: ${{ secrets.TOKEN }}
      run: python bot.py
